name: Flutter

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test with coverage
        run: flutter test --coverage

  debug-apk:
    name: Debug APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: analyze-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: saturn-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  release-aab:
    name: Release AAB
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: analyze-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret is empty or unavailable"
            exit 1
          fi

          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/saturn-release.p12

          file_size=$(stat -c%s android/app/saturn-release.p12)
          echo "Decoded keystore size: ${file_size} bytes"
          if [ "$file_size" -eq 0 ]; then
            echo "Decoded keystore is empty"
            exit 1
          fi

          sha256sum android/app/saturn-release.p12

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf '%s\n' \
            "storePassword=${KEYSTORE_PASSWORD}" \
            "keyPassword=${KEY_PASSWORD}" \
            "keyAlias=${KEY_ALIAS}" \
            "storeFile=saturn-release.p12" \
            > android/key.properties

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: saturn-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
